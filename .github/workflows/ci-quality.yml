name: CI Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"

jobs:
  quality-gate:
    name: Stability Gate (Preflight + Local Checks)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BALN_OPS_HEALER_TOKEN: ${{ secrets.BALN_OPS_HEALER_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Automated stability suite
        run: npm run qa:stability

      - name: Upload stability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stability-report
          path: reports/stability/latest.*
          if-no-files-found: ignore

  lint-critical:
    name: Lint Critical Paths
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint critical files
        run: npm run lint:critical

  lint-full-report:
    name: Lint Full Repo (Report Only)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint full repo (debt visibility)
        run: |
          mkdir -p reports/lint-full
          npm run lint > reports/lint-full/latest.txt 2>&1 || true
          tail -n 200 reports/lint-full/latest.txt || true

      - name: Upload lint debt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-full-report
          path: reports/lint-full/latest.txt
          if-no-files-found: ignore
