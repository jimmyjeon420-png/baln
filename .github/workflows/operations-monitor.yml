name: Operations Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "10 * * * *"

jobs:
  freshness-monitor:
    name: Content Freshness Monitor
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run freshness monitor
        env:
          BALN_OPS_HEALER_TOKEN: ${{ secrets.BALN_OPS_HEALER_TOKEN }}
        run: npm run qa:content-freshness

      - name: Upload operations report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: operations-report
          path: reports/operations/latest.*
          if-no-files-found: ignore
