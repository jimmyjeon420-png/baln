name: Operations Healer

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: operations-healer
  cancel-in-progress: false

jobs:
  heal:
    name: Heal Production Content
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Invoke ops-content-healer
        env:
          OPS_HEALER_URL: https://ruqeinfcqhgexrckonsy.supabase.co/functions/v1/ops-content-healer
          OPS_HEALER_TOKEN: ${{ secrets.BALN_OPS_HEALER_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${OPS_HEALER_TOKEN:-}" ]; then
            echo "Missing GitHub secret: BALN_OPS_HEALER_TOKEN"
            exit 1
          fi

          echo "OPS_HEALER_TOKEN length: $(printf %s "$OPS_HEALER_TOKEN" | wc -c | tr -d ' ')"
          echo "OPS_HEALER_TOKEN sha256: $(printf %s "$OPS_HEALER_TOKEN" | shasum -a 256 | awk '{print $1}')"

          response=$(curl -sS -w '\n%{http_code}' \
            -X POST "$OPS_HEALER_URL" \
            -H "Content-Type: application/json" \
            -H "x-ops-token: $OPS_HEALER_TOKEN" \
            --data '{"source":"github-actions","mode":"heal"}')

          body=$(printf '%s\n' "$response" | sed '$d')
          status=$(printf '%s\n' "$response" | tail -n1)

          echo "$body"

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "ops-content-healer failed with status $status"
            exit 1
          fi
